<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Loop Lancer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="hero">
          <p class="eyebrow">Teens Tier Sample</p>
          <h1>Loop Lancer</h1>
          <p class="summary">
            Drones breach from four lanes. Your current dash clears one lane now,
            and the lingering trail covers one lane on the next wave.
          </p>
        </div>

        <div class="hud">
          <div>
            <span class="label">Score</span>
            <strong data-score>0</strong>
          </div>
          <div>
            <span class="label">Integrity</span>
            <strong data-integrity>5</strong>
          </div>
          <div>
            <span class="label">Wave</span>
            <strong data-wave>1</strong>
          </div>
        </div>

        <section class="arena-card">
          <div class="arena-grid" data-lanes></div>
          <div class="arena-meta">
            <p data-trail>Trail: none</p>
            <p data-last-wave>Last wave: no drones yet</p>
          </div>
        </section>

        <section class="control-card">
          <p class="label">Select Dash Lane</p>
          <div class="lane-picker" data-lane-picker></div>
        </section>

        <p class="status" data-status>
          Choose a lane, then dash into the next breach.
        </p>

        <div class="actions">
          <button type="button" data-dash>Dash</button>
          <button type="button" class="ghost" data-reset>Reset Run</button>
        </div>
      </section>
    </main>

    <script type="module" src="./game.js"></script>
  </body>
</html>
